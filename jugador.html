<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Cartón de Bingo - Juego en Vivo</title>
    <style>
        :root {
            --primary-blue: #1d3557;
            --accent-gold: #ffb703;
            --accent-red: #e63946;
            --bg-light: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--primary-blue);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            color: white;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .header h1 {
            color: var(--accent-gold);
            margin: 0;
            font-size: 1.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #cartones-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            width: 100%;
            max-width: 500px;
        }

        /* Estilo del Cartón */
        .carton-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            border: 4px solid var(--accent-gold);
            width: 100%;
            animation: slideUp 0.4s ease-out;
        }

        .info-jugador {
            background: var(--primary-blue);
            padding: 10px;
            text-align: center;
            border-bottom: 2px solid var(--accent-gold);
        }

        .info-jugador .nombre {
            display: block;
            font-weight: 900;
            font-size: 1.2rem;
            color: var(--accent-gold);
        }

        .info-jugador .id-txt {
            font-size: 0.8rem;
            color: #cbd5e1;
        }

        /* Tabla de Bingo */
        table {
            width: 100%;
            border-collapse: collapse;
            user-select: none; /* Evita selección de texto molesta al tocar */
        }

        th {
            background: var(--accent-red);
            color: white;
            font-size: 1.5rem;
            padding: 10px 0;
            width: 20%;
            border: 1px solid rgba(255,255,255,0.2);
        }

        td {
            height: 65px; /* Tamaño optimizado para dedos en móviles */
            text-align: center;
            vertical-align: middle;
            font-size: 1.6rem;
            font-weight: 900;
            color: var(--primary-blue);
            border: 1px solid #e2e8f0;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
        }

        /* Estado Marcado */
        td.marcada {
            background-color: var(--accent-gold);
            color: var(--primary-blue);
            transform: scale(0.92);
            border-radius: 10px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
        }

        /* Casilla FREE */
        td.free {
            background-color: var(--primary-blue);
            color: var(--accent-gold);
            font-size: 2rem;
        }

        .error-box {
            background: var(--accent-red);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            margin-top: 50px;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>BINGO DIGITAL</h1>
        <p>Marca tus números al salir</p>
    </div>

    <div id="cartones-container">
        </div>

    <script>
        // 1. Obtener los datos codificados de la URL (?p=...)
        const params = new URLSearchParams(window.location.search);
        const dataEncoded = params.get('p');
        const container = document.getElementById('cartones-container');

        if (!dataEncoded) {
            container.innerHTML = `<div class="error-box"><h3>⚠️ Enlace no válido</h3><p>Pide a tu administrador un nuevo link.</p></div>`;
        } else {
            try {
                // 2. Decodificar Base64
                const jsonStr = atob(dataEncoded);
                const listaCartones = JSON.parse(jsonStr);

                // 3. Renderizar cada cartón
                listaCartones.forEach(obj => {
                    const matriz = generarMatrizFija(obj.id);
                    renderizarCarton(obj.id, obj.nombre, matriz);
                });
            } catch (e) {
                console.error(e);
                container.innerHTML = `<div class="error-box"><h3>⚠️ Error de lectura</h3><p>El enlace parece estar corrupto.</p></div>`;
            }
        }

        // --- LÓGICA DE GENERACIÓN (Sincronizada con el Admin) ---
        function generarMatrizFija(id) {
            const seedBase = parseInt(id);
            const rangos = [[1,15],[16,30],[31,45],[46,60],[61,75]];
            
            const columnas = rangos.map(r => {
                let n = []; 
                for(let i=r[0]; i<=r[1]; i++) n.push(i);
                
                // Usamos la misma semilla matemática que el admin
                return shuffleConSemilla(n, seedBase).slice(0, 5);
            });

            let filas = [];
            for(let f=0; f<5; f++) {
                let fila = [];
                for(let c=0; c<5; c++) {
                    fila.push((f === 2 && c === 2) ? "FREE" : columnas[c][f]);
                }
                filas.push(fila);
            }
            return filas;
        }

        function shuffleConSemilla(array, seed) {
            let m = array.length, t, i;
            while (m) {
                // Generador determinista (siempre da el mismo orden para el mismo ID)
                i = Math.floor(Math.abs(Math.sin(seed++)) * m--);
                t = array[m]; array[m] = array[i]; array[i] = t;
            }
            return array;
        }

        // --- DIBUJAR EN PANTALLA ---
        function renderizarCarton(id, nombre, matriz) {
            const cardDiv = document.createElement('div');
            cardDiv.className = 'carton-card';

            let tableHTML = `
                <div class="info-jugador">
                    <span class="nombre">${nombre.toUpperCase()}</span>
                    <span class="id-txt">ID CARTÓN: #${id}</span>
                </div>
                <table>
                    <tr><th>B</th><th>I</th><th>N</th><th>G</th><th>O</th></tr>
            `;

            matriz.forEach(fila => {
                tableHTML += `<tr>`;
                fila.forEach(celda => {
                    if (celda === "FREE") {
                        tableHTML += `<td class="free marcada">★</td>`;
                    } else {
                        tableHTML += `<td onclick="marcarCasilla(this)">${celda}</td>`;
                    }
                });
                tableHTML += `</tr>`;
            });

            tableHTML += `</table>`;
            cardDiv.innerHTML = tableHTML;
            container.appendChild(cardDiv);
        }

        // Función interactiva para el jugador
        function marcarCasilla(elemento) {
            elemento.classList.toggle('marcada');
            // Opcional: Podrías añadir un sonido de "clic" aquí
        }
    </script>
</body>
</html>
